<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <alias>
        <family>monospace</family>
        <prefer><family>JetBrains Mono Nerd Font</family></prefer>
    </alias>

    <alias>
        <family>sans-serif</family>
        <prefer><family>Adwaita Sans</family></prefer>
    </alias>

    <alias>
        <family>serif</family>
        <prefer><family>Adwaita Sans</family></prefer>
    </alias>
</fontconfig>
